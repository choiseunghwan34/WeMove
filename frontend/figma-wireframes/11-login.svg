<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1024" viewBox="0 0 1600 1024" fill="none">
  <title>WeMove 로그인</title>
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="rgba(15,23,42,0.03)"/>
    </filter>
    <linearGradient id="primaryButton" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="heroOverlay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10213e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1600" height="1024" fill="#f6f7f8"/>
  <rect x="0" y="0" width="1600" height="1024" rx="0" fill="#0f172a" stroke="transparent" stroke-width="1" opacity="1" />
<rect x="0" y="0" width="1600" height="1024" rx="0" fill="url(#heroOverlay)" stroke="transparent" stroke-width="1" opacity="0.52" />
<rect x="210" y="180" width="34" height="34" rx="17" fill="#2563eb" stroke="#2563eb" stroke-width="1" opacity="1" />
<text x="227" y="202" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="0" opacity="1"><tspan x="227" dy="0">W</tspan></text>
<text x="262" y="206" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="262" dy="0">WeMove</tspan></text>
<rect x="210" y="226" width="300" height="46" rx="18" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.18)" stroke-width="1" opacity="1" />
<text x="230" y="256" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="start" letter-spacing="0.08em" opacity="1"><tspan x="230" dy="0">LOCAL FITNESS COMMUNITY</tspan></text>
<text x="210" y="320" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="start" letter-spacing="-0.04em" opacity="1"><tspan x="210" dy="0">동네 운동이 더</tspan><tspan x="210" dy="46">자연스럽게 이어지는 방식</tspan></text>
<text x="210" y="440" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500" fill="#e5eefb" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="210" dy="0">가까운 사람들과 함께 운동 루틴을 만들고, 모임을 찾고, 참여하고,</tspan><tspan x="210" dy="20">관리할 수 있는 지역 기반 운동 플랫폼입니다.</tspan></text>
<rect x="210" y="512" width="240" height="84" rx="20" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.14)" stroke-width="1" opacity="1" />
<text x="230" y="546" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="230" dy="0">328+</tspan></text>
<text x="230" y="572" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500" fill="#e5eefb" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="230" dy="0">활성 모임</tspan></text>
<rect x="210" y="616" width="240" height="84" rx="20" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.14)" stroke-width="1" opacity="1" />
<text x="230" y="650" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="230" dy="0">8.9K</tspan></text>
<text x="230" y="676" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500" fill="#e5eefb" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="230" dy="0">누적 참여</tspan></text>
<rect x="210" y="720" width="240" height="84" rx="20" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.14)" stroke-width="1" opacity="1" />
<text x="230" y="754" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="230" dy="0">4.8</tspan></text>
<text x="230" y="780" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500" fill="#e5eefb" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="230" dy="0">평균 만족도</tspan></text>
<rect x="622" y="170" width="432" height="458" rx="28" fill="rgba(255,255,255,0.96)" stroke="#e5e7eb" stroke-width="1" opacity="1" filter="url(#cardShadow)"/>
<rect x="662" y="200" width="56" height="28" rx="999" fill="#eff6ff" stroke="transparent" stroke-width="1" opacity="1" />
<text x="690" y="219" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="12" font-weight="700" fill="#2563eb" text-anchor="middle" letter-spacing="0" opacity="1"><tspan x="690" dy="0">로그인</tspan></text>
<text x="662" y="260" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="26" font-weight="800" fill="#111827" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="662" dy="0">오늘은 누구와 같이 움직여볼까요?</tspan></text>
<text x="662" y="318" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500" fill="#6b7280" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="662" dy="0">로그인하고 내 주변 운동 모임을 바로 확인해보세요.</tspan></text>
<text x="662" y="350" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="700" fill="#6b7280" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="662" dy="0">아이디 또는 이메일</tspan></text>
<rect x="662" y="360" width="376" height="48" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" opacity="1" />
<text x="678" y="390" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500" fill="#8b95a1" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="678" dy="0">user01</tspan></text>
<text x="662" y="426" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="700" fill="#6b7280" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="662" dy="0">비밀번호</tspan></text>
<rect x="662" y="436" width="376" height="48" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" opacity="1" />
<text x="678" y="466" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500" fill="#8b95a1" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="678" dy="0">••••</tspan></text>
<rect x="662" y="520" width="376" height="54" rx="12" fill="url(#primaryButton)" stroke="#2563eb" stroke-width="1" opacity="1" />
<text x="850" y="553" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0" opacity="1"><tspan x="850" dy="0">로그인</tspan></text>
<text x="850" y="614" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500" fill="#6b7280" text-anchor="middle" letter-spacing="0" opacity="1"><tspan x="850" dy="0">회원가입</tspan></text>
<text x="940" y="614" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500" fill="#6b7280" text-anchor="middle" letter-spacing="0" opacity="1"><tspan x="940" dy="0">· 아이디/비밀번호 찾기</tspan></text>
</svg>