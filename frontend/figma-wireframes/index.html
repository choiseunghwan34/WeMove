<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>WeMove Figma Wireframes</title>
  <style>
    body { margin:0; padding:24px; background:#f3f4f6; font-family:Pretendard, sans-serif; }
    h1 { margin:0 0 20px; font-size:28px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:20px; }
    .card { background:#fff; border:1px solid #e5e7eb; border-radius:18px; padding:16px; box-shadow:0 4px 14px rgba(15,23,42,0.03); }
    .card img { width:100%; border:1px solid #e5e7eb; border-radius:12px; display:block; }
    .card p { margin:12px 0 0; font-size:14px; color:#4b5563; font-weight:700; }
  </style>
</head>
<body>
  <h1>WeMove Figma용 SVG 시안</h1>
  <div class="grid"><div class="card"><img src="./01-home.svg" alt="01-home.svg"/><p>01-home.svg</p></div><div class="card"><img src="./02-meeting-list.svg" alt="02-meeting-list.svg"/><p>02-meeting-list.svg</p></div><div class="card"><img src="./03-meeting-detail.svg" alt="03-meeting-detail.svg"/><p>03-meeting-detail.svg</p></div><div class="card"><img src="./04-meeting-create.svg" alt="04-meeting-create.svg"/><p>04-meeting-create.svg</p></div><div class="card"><img src="./05-meeting-edit.svg" alt="05-meeting-edit.svg"/><p>05-meeting-edit.svg</p></div><div class="card"><img src="./06-meeting-manage.svg" alt="06-meeting-manage.svg"/><p>06-meeting-manage.svg</p></div><div class="card"><img src="./07-activity.svg" alt="07-activity.svg"/><p>07-activity.svg</p></div><div class="card"><img src="./08-my-page.svg" alt="08-my-page.svg"/><p>08-my-page.svg</p></div><div class="card"><img src="./09-review.svg" alt="09-review.svg"/><p>09-review.svg</p></div><div class="card"><img src="./10-admin.svg" alt="10-admin.svg"/><p>10-admin.svg</p></div><div class="card"><img src="./11-login.svg" alt="11-login.svg"/><p>11-login.svg</p></div><div class="card"><img src="./12-signup.svg" alt="12-signup.svg"/><p>12-signup.svg</p></div><div class="card"><img src="./13-find-account.svg" alt="13-find-account.svg"/><p>13-find-account.svg</p></div></div>
</body>
</html>
