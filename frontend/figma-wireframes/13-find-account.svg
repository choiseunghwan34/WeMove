<rect x="622" y="170" width="432" height="504" rx="28" fill="rgba(255,255,255,0.96)" stroke="#e5e7eb" stroke-width="1" opacity="1" filter="url(#cardShadow)"/>
<rect x="662" y="200" width="78" height="28" rx="999" fill="#eff6ff" stroke="transparent" stroke-width="1" opacity="1" />
