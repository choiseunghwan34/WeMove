<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1024" viewBox="0 0 1600 1024" fill="none">
  <title>WeMove 계정 찾기</title>
  <defs>
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="rgba(15,23,42,0.03)"/>
    </filter>
    <linearGradient id="primaryButton" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="heroOverlay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10213e"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1600" height="1024" fill="#f6f7f8"/>
  <rect x="0" y="0" width="1600" height="1024" rx="0" fill="#0f172a" stroke="transparent" stroke-width="1" opacity="1" />
<rect x="0" y="0" width="1600" height="1024" rx="0" fill="url(#heroOverlay)" stroke="transparent" stroke-width="1" opacity="0.52" />
<rect x="210" y="180" width="34" height="34" rx="17" fill="#2563eb" stroke="#2563eb" stroke-width="1" opacity="1" />
<text x="227" y="202" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="800" fill="#fff" text-anchor="middle" letter-spacing="0" opacity="1"><tspan x="227" dy="0">W</tspan></text>
<text x="262" y="206" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="24" font-weight="800" fill="#ffffff" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="262" dy="0">WeMove</tspan></text>
<rect x="210" y="226" width="300" height="46" rx="18" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.18)" stroke-width="1" opacity="1" />
<text x="230" y="256" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="800" fill="#ffffff" text-anchor="start" letter-spacing="0.08em" opacity="1"><tspan x="230" dy="0">ACCOUNT SUPPORT</tspan></text>
<text x="210" y="320" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="start" letter-spacing="-0.04em" opacity="1"><tspan x="210" dy="0">아이디와 비밀번호를 빠르게</tspan><tspan x="210" dy="46">다시 찾는 방법</tspan></text>
<text x="210" y="440" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500" fill="#e5eefb" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="210" dy="0">가까운 사람들과 함께 운동 루틴을 만들고, 모임을 찾고, 참여하고,</tspan><tspan x="210" dy="20">관리할 수 있는 지역 기반 운동 플랫폼입니다.</tspan></text>
<rect x="210" y="512" width="240" height="84" rx="20" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.14)" stroke-width="1" opacity="1" />
