<text x="662" y="660" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="700" fill="#6b7280" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="662" dy="0">결과 안내</tspan></text>
<rect x="662" y="670" width="376" height="48" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" opacity="1" />
<text x="678" y="700" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500" fill="#8b95a1" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="678" dy="0">가입된 아이디: wemove_runner</tspan></text>
<rect x="662" y="754" width="376" height="54" rx="12" fill="url(#primaryButton)" stroke="#2563eb" stroke-width="1" opacity="1" />
<text x="850" y="787" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="0" opacity="1"><tspan x="850" dy="0">아이디 확인</tspan></text>
<text x="850" y="848" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500" fill="#6b7280" text-anchor="middle" letter-spacing="0" opacity="1"><tspan x="850" dy="0">로그인으로 돌아가기</tspan></text>
<text x="940" y="848" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500" fill="#6b7280" text-anchor="middle" letter-spacing="0" opacity="1"><tspan x="940" dy="0">· 회원가입</tspan></text>
