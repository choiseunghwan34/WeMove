<text x="230" y="676" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="14" font-weight="500" fill="#e5eefb" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="230" dy="0">계정 확인</tspan></text>
<rect x="210" y="720" width="240" height="84" rx="20" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.14)" stroke-width="1" opacity="1" />
