<text x="662" y="432" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="700" fill="#6b7280" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="662" dy="0">이름 또는 닉네임</tspan></text>
<rect x="662" y="442" width="376" height="48" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1" opacity="1" />
<text x="678" y="472" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500" fill="#8b95a1" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="678" dy="0">러너민수</tspan></text>
<text x="662" y="508" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="13" font-weight="700" fill="#6b7280" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="662" dy="0">가입 이메일</tspan></text>
