<text x="662" y="260" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="26" font-weight="800" fill="#111827" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="662" dy="0">계정 정보가 기억나지 않아도</tspan><tspan x="662" dy="35">안전하게 다시 연결할 수 있어요</tspan></text>
<text x="662" y="332" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="15" font-weight="500" fill="#6b7280" text-anchor="start" letter-spacing="0" opacity="1"><tspan x="662" dy="0">가입한 이메일과 기본 정보만 확인하면 안전하게 다시 연결할 수 있습니다.</tspan></text>
